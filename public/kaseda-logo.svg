<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;family=Montserrat:wght@200;400&amp;display=swap');
      .logo-title {
        font-family: 'Cormorant Garamond', 'Didot', 'Playfair Display', serif;
        font-size: 42px;
        font-weight: 500;
        letter-spacing: 0.35em;
        fill: currentColor;
      }
      .logo-subtitle {
        font-family: 'Montserrat', 'Helvetica Neue', sans-serif;
        font-size: 9px;
        font-weight: 400;
        letter-spacing: 0.6em;
        fill: currentColor;
        opacity: 0.8;
      }
      .logo-mark {
        stroke: currentColor;
        stroke-width: 1.5;
        fill: none;
      }
    </style>
  </defs>

  <g transform="translate(0, 0)">
    <!-- Central Luxury Emblem -->
    <g transform="translate(250, 55)">
      <!-- Outer elegant thin circle -->
      <circle cx="0" cy="0" r="32" class="logo-mark" opacity="0.9" />
      <!-- Inner geometric "Kalam + Kapada" symbol -->
      <!-- Vertical line represents Kalam (pen / quill) -->
      <line x1="0" y1="-22" x2="0" y2="22" class="logo-mark" stroke-linecap="round" />
      <!-- Point of the pen -->
      <path d="M -3 -15 L 0 -22 L 3 -15 Z" fill="currentColor" />
      <!-- Flowing S-curve represents Kapada (cloth / thread) winding around the pen -->
      <path d="M -15 8 C -15 8, -8 0, 0 0 C 8 0, 15 -8, 15 -8 M -15 -8 C -15 -8, -8 0, 0 0 C 8 0, 15 8, 15 8" class="logo-mark" stroke-linecap="round" opacity="0.8" />
      <!-- Minimalist elegant "K" elements in background or overlay -->
      <path d="M -12 -12 L 0 0 L 12 -12" class="logo-mark" stroke-linecap="round" />
      <path d="M -12 12 L 0 0 L 12 12" class="logo-mark" stroke-linecap="round" />
    </g>

    <!-- Wordmark -->
    <text x="258" y="132" text-anchor="middle" class="logo-title">KASEDA</text>
    
    <!-- Tagline -->
    <text x="254" y="162" text-anchor="middle" class="logo-subtitle">KALAM SE KAPADA</text>
  </g>
</svg>
